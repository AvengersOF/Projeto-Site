<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Avatar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Gerador de Personagem</h1>

<button onclick="gerarPersonagem()">Gerar Personagem</button>

<div class="card">

    <img id="avatar" src="https://i.pravatar.cc/200">

    <h2>Personagem</h2>

    <p>❤️ Vida: <span id="vida">0</span></p>
    <p>⚔️ Ataque: <span id="ataque">0</span></p>
    <p>🛡️ Defesa: <span id="defesa">0</span></p>
    <p>⚡ Velocidade: <span id="velocidade">0</span></p>

</div>

<script src="script.js"></script>

</body>
</html>
