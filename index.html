<section class="gerador">

<div class="card">

<img id="avatar" src="" alt="avatar">

<h3 id="nome"></h3>

<div class="status">

<p>❤️ Vida: <span id="vida"></span></p>
<p>⚔️ Ataque: <span id="ataque"></span></p>
<p>🛡️ Defesa: <span id="defesa"></span></p>
<p>⚡ Velocidade: <span id="velocidade"></span></p>
<p>⭐ Raridade: <span id="raridade"></span></p>

</div>

</div>
