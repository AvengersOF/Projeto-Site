<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Personagens</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <a href="#">MeuRPG</a>
    </div>
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
  </header>

  <!-- MENU LATERAL -->
  <nav id="menu">
    <ul>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Meus Personagens</a></li>
      <li><a href="#">+ Criar Novo Card</a></li>
    </ul>
  </nav>

<div class="logo">
<a href="#">HeroesForgeCard</a>
</div>

  <!-- CONTEÚDO -->
  <section class="conteudo">
    <h1>Gerador de Personagens</h1>
    <p>Clique no botão para criar um novo personagem.</p>
  </section>

  <!-- GERADOR -->
  <section class="gerador">
    <button onclick="gerarCard()">Criar Personagem</button>
    <div id="areaCards"></div>
  </section>
</header>


<!-- MENU LATERAL -->

<nav id="menu">

<ul>

<li><a href="#">Menu</a></li>
<li><a href="#">Meus Personagens</a></li>
<li><a href="#">+ Criar Novo Card</a></li>

</ul>

</nav>


<!-- IMAGEM HERO -->

<section class="hero">

<img src="background.jpg" alt="Imagem de Fundo">

</section>


<!-- CONTEÚDO -->

<section class="conteudo">

<h1 class="titulo-magico">CharacterForge</h1>
<p class="titulo-magico">Clique no botão para criar um novo personagem.</p>

</section>


<!-- GERADOR -->

<section class="gerador">

</section>


<script src="script.js"></script>
